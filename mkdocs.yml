site_name: CodedCactus
site_description: A blog about programming, technology, and software development.
site_url: https://codedcactus.github.io/
repo_url: https://github.com/codedcactus

theme:
  name: material
  palette:
    - scheme: slate            # dark by default
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/cactus
  favicon: assets/favicon_dark.svg
  features:
    - navigation.indexes
    - navigation.tabs
    - header.autohide
    - content.code.copy
    - toc.integrate
nav:
  - Home: index.md
  - Blog:
     - blog/index.md

plugins:
  - privacy
  - optimize
  - search
  - blog:
      blog_dir: blog
      blog_toc: true
      pagination_per_page: 5
      archive_pagination_per_page: 10
      categories_pagination_per_page: 10

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/codedcactus

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption

copyright: |
  &copy; 2026 <a href="https://github.com/codedcactus"  target="_blank" rel="noopener">CodedCactus</a>